<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Co-CEO — Time Audit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8f7ff;
            color: #111827;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 32px;
            background: #ffffff;
            border-bottom: 1px solid #ddd6fe;
        }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .header-dot { width: 10px; height: 10px; border-radius: 50%; background: #7c3aed; }
        .header-logo { font-weight: 700; font-size: 15px; color: #111827; letter-spacing: -0.4px; }
        .header-title { font-size: 12px; color: #9ca3af; margin-left: 12px; border-left: 1px solid #e5e7eb; padding-left: 12px; }
        .header-right { display: flex; gap: 16px; align-items: center; }
        .status-badge { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #6b7280; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }
        .container { flex: 1; display: flex; flex-direction: column; padding: 32px 40px; overflow-y: auto; }
        .warning-banner {
            background: #fffbeb;
            border: 1px solid #fcd34d;
            border-left: 4px solid #f59e0b;
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 28px;
            font-size: 14px;
            color: #92400e;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            font-weight: 500;
        }
        .card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 11px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .cascade-row {
            display: grid;
            grid-template-columns: 220px 160px 1fr;
            gap: 16px;
            padding: 13px 0;
            border-bottom: 1px solid #f3f4f6;
            align-items: center;
        }
        .cascade-row:last-child { border-bottom: none; }
        .cascade-label { font-size: 13px; color: #6b7280; }
        .cascade-value { font-size: 15px; color: #111827; font-weight: 600; filter: blur(3px); user-select: none; }
        .cascade-delta { text-align: right; font-size: 13px; font-weight: 600; color: #ef4444; }
        .cascade-delta.bold { font-size: 14px; }
        .button {
            background: #7c3aed;
            color: #ffffff;
            border: none;
            padding: 11px 22px;
            font-size: 14px;
            border-radius: 7px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.15s;
            align-self: flex-start;
        }
        .button:hover { background: #6d28d9; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-dot"></div>
            <div class="header-logo">AI Co-CEO</div>
            <div class="header-title">Weekly Assessment — April 21–27</div>
        </div>
        <div class="header-right">
            <div class="status-badge"><div class="status-dot"></div><span>Calendar connected</span></div>
            <div class="status-badge"><div class="status-dot"></div><span>Slack connected</span></div>
        </div>
    </div>
    <div class="container">
        <div class="warning-banner">
            <span>⚠</span>
            <span>You spent 60% of your time on things that don't connect to your 12-month target.</span>
        </div>
        <div class="card">
            <div class="card-title">Target Cascade</div>
            <div class="cascade-row">
                <div class="cascade-label">12-Month Target</div>
                <div class="cascade-value">$4.2M</div>
                <div class="cascade-delta">↓ 18%</div>
            </div>
            <div class="cascade-row">
                <div class="cascade-label">Quarter Target (Q2)</div>
                <div class="cascade-value">$1.1M</div>
                <div class="cascade-delta">↓ 22%</div>
            </div>
            <div class="cascade-row">
                <div class="cascade-label">Month Target (Apr)</div>
                <div class="cascade-value">$387K</div>
                <div class="cascade-delta">↓ 11%</div>
            </div>
            <div class="cascade-row">
                <div class="cascade-label">Last Week Actual</div>
                <div class="cascade-value">$74K</div>
                <div class="cascade-delta bold">↓ Gap: 27%</div>
            </div>
        </div>
        <button class="button" onclick="window.location.href='s4.html'">See performance details →</button>
    </div>
</body>
</html>
