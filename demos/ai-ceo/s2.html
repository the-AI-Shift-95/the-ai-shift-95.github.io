<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Co-CEO — Loading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8f7ff;
            color: #111827;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 32px;
            background: #ffffff;
            border-bottom: 1px solid #ddd6fe;
        }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .header-dot { width: 10px; height: 10px; border-radius: 50%; background: #7c3aed; }
        .header-logo { font-weight: 700; font-size: 15px; color: #111827; letter-spacing: -0.4px; }
        .header-right { display: flex; gap: 16px; align-items: center; }
        .status-badge { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #6b7280; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 48px;
            padding: 40px;
        }
        .heading { font-size: 15px; color: #6b7280; font-weight: 500; letter-spacing: -0.2px; }
        .tiles { display: flex; gap: 32px; justify-content: center; }
        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-width: 110px;
            background: #ffffff;
            border: 1px solid #ddd6fe;
            border-radius: 10px;
            padding: 20px 16px;
        }
        .tile-icon { font-size: 28px; }
        .tile-label { font-size: 12px; color: #374151; font-weight: 600; }
        .tile-sub { font-size: 10px; color: #9ca3af; min-height: 14px; text-align: center; line-height: 1.4; }
        .tile-status { font-size: 12px; color: #6b7280; min-height: 18px; display: flex; align-items: center; justify-content: center; }
        .tile-status.done { color: #22c55e; font-weight: 600; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 14px; height: 14px;
            border: 2px solid #ddd6fe;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .progress-container { width: 100%; max-width: 420px; }
        .progress-label { font-size: 12px; color: #6b7280; margin-bottom: 10px; text-align: center; }
        .progress-bar { width: 100%; height: 3px; background: #e5e7eb; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #7c3aed; width: 0%; transition: width 0.3s ease; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-dot"></div>
            <div class="header-logo">AI Co-CEO</div>
        </div>
        <div class="header-right">
            <div class="status-badge"><div class="status-dot"></div><span>Calendar connected</span></div>
            <div class="status-badge"><div class="status-dot"></div><span>Slack connected</span></div>
        </div>
    </div>
    <div class="container">
        <div class="heading">Analysing last week...</div>
        <div class="tiles">
            <div class="tile">
                <div class="tile-icon">📅</div>
                <div class="tile-label">Calendar</div>
                <div class="tile-sub" id="cal-sub">Scanning 847 events...</div>
                <div class="tile-status" id="cal-status"><div class="spinner"></div></div>
            </div>
            <div class="tile">
                <div class="tile-icon">💬</div>
                <div class="tile-label">Slack</div>
                <div class="tile-sub" id="slack-sub">Reading 23 conversations...</div>
                <div class="tile-status" id="slack-status"><div class="spinner"></div></div>
            </div>
            <div class="tile">
                <div class="tile-icon">📧</div>
                <div class="tile-label">Email</div>
                <div class="tile-sub" id="email-sub">Fetching 156 messages...</div>
                <div class="tile-status" id="email-status"><div class="spinner"></div></div>
            </div>
        </div>
        <div class="progress-container">
            <div class="progress-label" id="progress-label">Mapping time allocation to 12-month targets...</div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
    </div>
    <script>
        const fill = document.getElementById('progress-fill');
        let pct = 0;
        const interval = setInterval(() => {
            pct = Math.min(pct + 1.8, 100);
            fill.style.width = pct + '%';
            if (pct >= 100) clearInterval(interval);
        }, 80);

        setTimeout(() => {
            document.getElementById('cal-sub').textContent = '847 events processed';
            document.getElementById('cal-status').innerHTML = '<span class="done">✓ Pulled</span>';
        }, 1800);

        setTimeout(() => {
            document.getElementById('slack-sub').textContent = '23 conversations indexed';
            document.getElementById('slack-status').innerHTML = '<span class="done">✓ Pulled</span>';
        }, 2700);

        setTimeout(() => {
            document.getElementById('email-sub').textContent = '156 messages scanned';
            document.getElementById('email-status').innerHTML = '<span class="done">✓ Pulled</span>';
            document.getElementById('progress-label').textContent = 'Generating assessment...';
        }, 3600);

        setTimeout(() => { window.location.href = 's3.html'; }, 5000);
    </script>
</body>
</html>
