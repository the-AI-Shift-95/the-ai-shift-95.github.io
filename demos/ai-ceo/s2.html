<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Co-CEO — Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8f7ff;
            color: #111827;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: #ffffff;
            border-bottom: 1px solid #ddd6fe;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #7c3aed;
        }

        .header-logo {
            font-weight: 600;
            font-size: 16px;
            color: #111827;
            letter-spacing: -0.5px;
        }

        .header-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #6b7280;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }

        /* Main content */
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            flex-direction: column;
            gap: 40px;
        }

        .label {
            font-size: 14px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tiles {
            display: flex;
            gap: 24px;
            justify-content: center;
        }

        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            min-width: 100px;
        }

        .tile-icon {
            font-size: 32px;
        }

        .tile-label {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tile-status {
            font-size: 12px;
            color: #6b7280;
            min-height: 16px;
        }

        .tile-status.loading {
            color: #6b7280;
        }

        .tile-status.done {
            color: #22c55e;
            font-weight: 500;
        }

        /* Spinner */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #ddd6fe;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Progress bar */
        .progress-container {
            width: 100%;
            max-width: 400px;
        }

        .progress-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 8px;
            text-align: left;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #7c3aed;
            animation: fillProgress 3s ease-out forwards;
        }

        @keyframes fillProgress {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-dot"></div>
            <div class="header-logo">AI Co-CEO</div>
        </div>
        <div class="header-right">
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Calendar connected</span>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Slack connected</span>
            </div>
        </div>
    </div>

    <!-- Main content -->
    <div class="container">
        <div class="label">Analysing last week...</div>

        <div class="tiles">
            <div class="tile">
                <div class="tile-icon">📅</div>
                <div class="tile-label">Calendar</div>
                <div class="tile-status loading" id="cal-status">
                    <div class="spinner"></div>
                </div>
            </div>

            <div class="tile">
                <div class="tile-icon">💬</div>
                <div class="tile-label">Slack</div>
                <div class="tile-status loading" id="slack-status">
                    <div class="spinner"></div>
                </div>
            </div>

            <div class="tile">
                <div class="tile-icon">📧</div>
                <div class="tile-label">Email</div>
                <div class="tile-status loading" id="email-status">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-label">Mapping time allocation to 12-month targets...</div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>

    <script>
        // Calendar done at 0.8s
        setTimeout(() => {
            document.getElementById('cal-status').innerHTML = '<span style="color: #22c55e; font-weight: 500;">✓ Pulled</span>';
        }, 800);

        // Slack done at 1.4s
        setTimeout(() => {
            document.getElementById('slack-status').innerHTML = '<span style="color: #22c55e; font-weight: 500;">✓ Pulled</span>';
        }, 1400);

        // Email done at 2.2s
        setTimeout(() => {
            document.getElementById('email-status').innerHTML = '<span style="color: #22c55e; font-weight: 500;">✓ Pulled</span>';
        }, 2200);

        // Auto-advance to s3.html after 3.5 seconds
        setTimeout(() => {
            window.location.href = 's3.html';
        }, 3500);
    </script>
</body>
</html>
