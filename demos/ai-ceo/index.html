<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Co-CEO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8f7ff;
            color: #111827;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 32px;
            background: #ffffff;
            border-bottom: 1px solid #ddd6fe;
        }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .header-dot { width: 10px; height: 10px; border-radius: 50%; background: #7c3aed; }
        .header-logo { font-weight: 700; font-size: 15px; color: #111827; letter-spacing: -0.4px; }
        .header-right { display: flex; gap: 16px; align-items: center; }
        .status-badge { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #6b7280; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }
        .last-run { font-size: 11px; color: #9ca3af; border-left: 1px solid #e5e7eb; padding-left: 16px; margin-left: 4px; }
        .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .content { max-width: 580px; width: 100%; }
        .label { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 20px; font-weight: 600; }
        .input-field {
            width: 100%;
            padding: 16px 18px;
            font-size: 17px;
            border: 1.5px solid #ddd6fe;
            border-radius: 10px;
            background: #ffffff;
            color: #111827;
            font-family: inherit;
            margin-bottom: 20px;
            display: block;
        }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 20px;
            background: #7c3aed;
            animation: blink 1s step-end infinite;
            margin-left: 1px;
            vertical-align: middle;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .button-row { display: flex; justify-content: flex-end; }
        .button {
            background: #7c3aed;
            color: #ffffff;
            border: none;
            padding: 11px 22px;
            font-size: 14px;
            border-radius: 7px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.15s;
        }
        .button:hover { background: #6d28d9; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-dot"></div>
            <div class="header-logo">AI Co-CEO</div>
        </div>
        <div class="header-right">
            <div class="status-badge"><div class="status-dot"></div><span>Calendar connected</span></div>
            <div class="status-badge"><div class="status-dot"></div><span>Slack connected</span></div>
            <div class="last-run">Last run: Sun, Apr 20 · 8:14 AM</div>
        </div>
    </div>
    <div class="container">
        <div class="content">
            <div class="label">Sunday Assessment</div>
            <div class="input-field">How did last week actually go?<span class="cursor"></span></div>
            <div class="button-row">
                <button class="button" onclick="window.location.href='s2.html'">Run Assessment →</button>
            </div>
        </div>
    </div>
</body>
</html>
