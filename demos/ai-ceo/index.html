<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Co-CEO — Sunday Assessment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8f7ff;
            color: #111827;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: #ffffff;
            border-bottom: 1px solid #ddd6fe;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #7c3aed;
        }

        .header-logo {
            font-weight: 600;
            font-size: 16px;
            color: #111827;
            letter-spacing: -0.5px;
        }

        .header-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #6b7280;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }

        /* Main content */
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .content {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .label {
            font-size: 14px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 32px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            border: 2px solid #ddd6fe;
            border-radius: 8px;
            background: #ffffff;
            color: #111827;
            font-family: inherit;
        }

        input[type="text"]::placeholder {
            color: #d1d5db;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #7c3aed;
            background: #faf5ff;
        }

        /* Blinking cursor animation */
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        input[type="text"]:focus::after {
            content: '';
            animation: blink 1s infinite;
        }

        /* Button */
        .button {
            background: #7c3aed;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            float: right;
        }

        .button:hover {
            background: #6d28d9;
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-dot"></div>
            <div class="header-logo">AI Co-CEO</div>
        </div>
        <div class="header-right">
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Calendar connected</span>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Slack connected</span>
            </div>
        </div>
    </div>

    <!-- Main content -->
    <div class="container">
        <div class="content">
            <div class="label">Sunday Assessment</div>
            <div class="input-wrapper">
                <input type="text" placeholder="How did last week actually go?" value="How did last week actually go?">
            </div>
            <button class="button" onclick="window.location.href='s2.html'">Run Assessment →</button>
        </div>
    </div>
</body>
</html>
