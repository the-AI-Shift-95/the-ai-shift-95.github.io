<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Co-CEO — Prescription</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8f7ff;
            color: #111827;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: #ffffff;
            border-bottom: 1px solid #ddd6fe;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #7c3aed;
        }

        .header-logo {
            font-weight: 600;
            font-size: 16px;
            color: #111827;
            letter-spacing: -0.5px;
        }

        .header-title {
            font-size: 12px;
            color: #6b7280;
            margin-left: 12px;
            border-left: 1px solid #ddd6fe;
            padding-left: 12px;
        }

        .header-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #6b7280;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }

        /* Main content */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            overflow-y: auto;
        }

        .table {
            background: #ffffff;
            border: 1px solid #ddd6fe;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .table-row {
            display: grid;
            grid-template-columns: 200px 100px 250px 80px;
            gap: 20px;
            padding: 16px 20px;
            border-bottom: 1px solid #f3f4f6;
            align-items: center;
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .table-cell {
            font-size: 13px;
            color: #374151;
        }

        .table-cell.blur {
            filter: blur(4px);
            color: #9ca3af;
        }

        .table-button {
            background: none;
            border: none;
            color: #7c3aed;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            text-decoration: underline;
            padding: 0;
        }

        .table-button:hover {
            color: #6d28d9;
        }

        .draft-panel {
            background: #ffffff;
            border: 1px solid #ddd6fe;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            display: none;
        }

        .draft-panel.visible {
            display: block;
        }

        .draft-title {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .draft-content {
            font-size: 13px;
            line-height: 1.8;
            color: #374151;
        }

        .skeleton-line {
            height: 12px;
            background: #e5e7eb;
            border-radius: 4px;
            margin-bottom: 8px;
            filter: blur(2px);
        }

        .skeleton-line:last-child {
            margin-bottom: 0;
        }

        /* Button */
        .button {
            background: #7c3aed;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            align-self: flex-start;
        }

        .button:hover {
            background: #6d28d9;
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-dot"></div>
            <div class="header-logo">AI Co-CEO</div>
            <div class="header-title">Time Audit — Operational Pull</div>
        </div>
        <div class="header-right">
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Calendar connected</span>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Slack connected</span>
            </div>
        </div>
    </div>

    <!-- Main content -->
    <div class="container">
        <div class="table">
            <div class="table-row" style="background: #f9fafb; font-weight: 500;">
                <div class="table-cell">Person</div>
                <div class="table-cell">Hours</div>
                <div class="table-cell">Rule</div>
                <div class="table-cell"></div>
            </div>

            <div class="table-row">
                <div class="table-cell blur">Sarah Chen</div>
                <div class="table-cell">4.2 hrs</div>
                <div class="table-cell">Message only if decision costs $X+ or generates $Y+</div>
                <button class="table-button" onclick="toggleDraft()">Draft →</button>
            </div>

            <div class="table-row">
                <div class="table-cell blur">Marcus Lee</div>
                <div class="table-cell">2.8 hrs</div>
                <div class="table-cell">Max 1x weekly check-in</div>
                <button class="table-button" onclick="alert('Draft shown for Row 1 only')">Draft →</button>
            </div>

            <div class="table-row">
                <div class="table-cell blur">Emma Rodriguez</div>
                <div class="table-cell">1.9 hrs</div>
                <div class="table-cell">#ops-channel muted except 9am</div>
                <button class="table-button" onclick="alert('Draft shown for Row 1 only')">Draft →</button>
            </div>
        </div>

        <div class="draft-panel" id="draft-panel">
            <div class="draft-title">Draft Slack message — ready to send</div>
            <div class="draft-content">
                <div class="skeleton-line" style="width: 95%;"></div>
                <div class="skeleton-line" style="width: 100%;"></div>
                <div class="skeleton-line" style="width: 92%;"></div>
                <div class="skeleton-line" style="width: 88%;"></div>
            </div>
        </div>

        <button class="button" onclick="window.location.href='s6.html'">See week plan →</button>
    </div>

    <script>
        function toggleDraft() {
            const panel = document.getElementById('draft-panel');
            panel.classList.toggle('visible');
        }
    </script>
</body>
</html>
