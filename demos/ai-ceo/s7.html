<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Co-CEO — End of Day</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8f7ff;
            color: #111827;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: #ffffff;
            border-bottom: 1px solid #ddd6fe;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #7c3aed;
        }

        .header-logo {
            font-weight: 600;
            font-size: 16px;
            color: #111827;
            letter-spacing: -0.5px;
        }

        .header-title {
            font-size: 12px;
            color: #6b7280;
            margin-left: 12px;
            border-left: 1px solid #ddd6fe;
            padding-left: 12px;
        }

        .header-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #6b7280;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }

        /* Main content */
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            flex-direction: column;
            gap: 40px;
        }

        .label {
            font-size: 14px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            text-align: center;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            font-size: 14px;
            border: 2px solid #ddd6fe;
            border-radius: 8px;
            background: #ffffff;
            color: #111827;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #7c3aed;
            background: #faf5ff;
        }

        .response-box {
            background: #ffffff;
            border: 1px solid #ddd6fe;
            border-radius: 8px;
            padding: 24px;
            width: 100%;
            max-width: 600px;
        }

        .response-text {
            font-size: 14px;
            line-height: 1.8;
            color: #374151;
            min-height: 60px;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 18px;
            background: #7c3aed;
            animation: blink 1s infinite;
            margin-left: 4px;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        .demo-footer {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-dot"></div>
            <div class="header-logo">AI Co-CEO</div>
            <div class="header-title">End of Day</div>
        </div>
        <div class="header-right">
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Calendar connected</span>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Slack connected</span>
            </div>
        </div>
    </div>

    <!-- Main content -->
    <div class="container">
        <div class="input-wrapper">
            <div class="label">Your Daily Reflection</div>
            <input type="text" value="End of day — how did today go and what's tomorrow's plan?" readonly>
        </div>

        <div class="response-box">
            <div class="response-text">
                Today you completed 2 of 3 priorities. The creative review ran over — move the brief to tomorrow 9am. Tomorrow's highest-leverage action is...<span class="cursor"></span>
            </div>
        </div>

        <div class="demo-footer">End of demo</div>
    </div>
</body>
</html>
